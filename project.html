<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemini Learning Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      text-align: center;
    }
    #container {
      display: flex;
      height: 100vh;
    }
    nav {
      width: 20%;
      background: #333;
      color: white;
      padding: 20px;
    }
    nav a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px 0;
    }
    main {
      flex: 1;
      padding: 20px;
      background: #fff;
      overflow-y: auto;
    }
    section {
      margin-bottom: 30px;
    }
    #chat-window {
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: scroll;
      padding: 10px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gemini AI Learning Assistant</h1>
  </header>

  <div id="container">
    <nav>
      <h3>Menu</h3>
      <a href="#chat">Chat</a>
      <a href="#quiz">Quiz</a>
    </nav>

    <main>
      
      <!-- Chat Section -->
      <section id="chat">
        <h2>Ask Gemini</h2>
        <div id="chat-window"></div>
        <input type="text" id="user-input" placeholder="Type your question...">
        <button onclick="sendMessage()">Send</button>
      </section>

      <!-- Quiz Section -->
      <section id="quiz">
        <h2>Generate Quiz</h2>
        <button onclick="generateQuiz()">Create MCQs</button>
        <div id="quiz-output"></div>
      </section>
    </main>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('user-input').value;
      const chatWindow = document.getElementById('chat-window');
      chatWindow.innerHTML += "<p>At its core, Artificial Intelligence (AI) is a field of computer science dedicated to building software and systems that can perform tasks we usually associate with human intelligence.<br><b1>Generative AI: Tools (like me!) that can create text, images, code, or art from a simple prompt.</b1> </p>";
      // Here you would call your backend API (FastAPI/Flask) that connects to Gemini
      // Example: fetch('/ask?query=' + input).then(...)
    }

    function generateQuiz() {
      const quizOutput = document.getElementById('quiz-output');
      quizOutput.innerHTML = "<p> what is ai process </p>";
      // Backend call to Gemini quiz generator would go here
    }
  </script>
</body>
</html>
