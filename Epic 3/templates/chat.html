{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🤖 Ask EduGenie</h2>
    <p>Get conceptual explanations powered by Gemini 1.5 Pro.</p>
    
    <div class="chat-box" id="chatBox">
        <div class="message assistant">Hello! I'm EduGenie. What core concept can I help you break down today?</div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="userInput" placeholder="Ask a question..." style="margin: 0;">
        <button class="btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let history = [];

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        
        input.value = '';
        appendMessage('user', text);
        
        const response = await fetch('/api/v2/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text, history: history })
        });
        
        const data = await response.json();
        appendMessage('assistant', data.response);
        
        history.push({role: 'user', content: text});
        history.push({role: 'assistant', content: data.response});
    }

    function appendMessage(role, text) {
        const box = document.getElementById('chatBox');
        const msg = document.createElement('div');
        msg.className = `message ${role}`;
        msg.innerText = text;
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
    }
</script>
{% endblock %}
